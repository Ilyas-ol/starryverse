<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StarryVerse — Guess the Constellation | AstroTech Club</title>
    <meta name="description" content="Test your constellation knowledge in this interactive quiz by AstroTech Club's StarryVerse event. Can you identify all the star patterns?">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Club Logo (fixed top-left) -->
    <a href="#" class="club-logo" title="AstroTech Club">
        <img src="logo.png" alt="AstroTech Club Logo" />
    </a>

    <!-- Animated star particle canvas (background) -->
    <canvas id="starfield"></canvas>

    <!-- ======================== WELCOME SCREEN ======================== -->
    <section id="welcome-screen" class="screen active">
        <div class="welcome-content">
            <div class="logo-area">
                <div class="logo-glow"></div>
                <h1 class="logo-text">
                    <span class="logo-starry">STARRY</span>
                    <span class="logo-verse">VERSE</span>
                </h1>
                <p class="tagline">Above the Iftar Table</p>
            </div>
            <div class="event-badge">
                <span class="badge-icon">🔭</span>
                <span class="badge-text">AstroTech Club</span>
            </div>
            <p class="welcome-desc">Can you identify the constellations from their star patterns alone? Test your celestial knowledge in this 10-question challenge!</p>
            <button id="start-btn" class="btn-primary">
                <span class="btn-text">Launch Quiz</span>
                <span class="btn-icon">🚀</span>
            </button>
            <div class="star-decoration star-1">✦</div>
            <div class="star-decoration star-2">✧</div>
            <div class="star-decoration star-3">⋆</div>
        </div>
    </section>

    <!-- ======================== QUIZ SCREEN ======================== -->
    <section id="quiz-screen" class="screen">
        <div class="quiz-header">
            <div class="progress-info">
                <span id="question-counter" class="question-counter">1 / 10</span>
                <div class="progress-bar-track">
                    <div id="progress-bar" class="progress-bar-fill"></div>
                </div>
            </div>
            <div id="score-display" class="score-display">
                <span class="score-icon">⭐</span>
                <span id="current-score">0</span>
            </div>
        </div>

        <div class="quiz-body">
            <p id="hint-text" class="hint-text"></p>
            <div class="constellation-card">
                <div class="card-glow"></div>
                <p class="card-prompt">Which constellation is this?</p>
                <div class="canvas-wrapper">
                    <canvas id="constellation-canvas" width="400" height="350"></canvas>
                    <img id="reveal-image" class="reveal-image hidden" src="" alt="Constellation illustration" />
                </div>
            </div>

            <div id="answers-container" class="answers-container">
                <!-- Buttons generated by JS -->
            </div>

            <div id="feedback-panel" class="feedback-panel hidden">
                <div id="feedback-icon" class="feedback-icon"></div>
                <p id="feedback-text" class="feedback-text"></p>
                <p id="fun-fact" class="fun-fact"></p>
                <button id="next-btn" class="btn-primary btn-next">
                    <span class="btn-text">Next</span>
                    <span class="btn-icon">→</span>
                </button>
            </div>
        </div>
    </section>

    <!-- ======================== RESULTS SCREEN ======================== -->
    <section id="results-screen" class="screen">
        <div class="results-content">
            <div id="results-emoji" class="results-emoji">🌌</div>
            <h2 id="results-title" class="results-title">Star Navigator</h2>
            <div class="score-ring">
                <svg viewBox="0 0 120 120" class="score-svg">
                    <circle cx="60" cy="60" r="54" class="score-ring-bg"/>
                    <circle id="score-ring-fill" cx="60" cy="60" r="54" class="score-ring-fill"/>
                </svg>
                <div class="score-number">
                    <span id="final-score" class="final-score-num">0</span>
                    <span class="final-score-total">/ 10</span>
                </div>
            </div>
            <p id="results-message" class="results-message"></p>
            <div class="results-actions">
                <button id="retry-btn" class="btn-primary">
                    <span class="btn-text">Try Again</span>
                    <span class="btn-icon">🔄</span>
                </button>
            </div>
            <div class="results-footer">
                <span class="footer-badge">🔭 AstroTech Club — StarryVerse</span>
            </div>
        </div>
    </section>

    <script src="app.js"></script>
</body>
</html>
